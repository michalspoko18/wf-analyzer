services:
  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    env_file: .env
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_URL: ${FRONTEND_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    restart: unless-stopped
