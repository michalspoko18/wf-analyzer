services:
  init-db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - ./db/init.sql:/init.sql:ro
    entrypoint: >
      sh -c "psql \"$$DATABASE_URL\" -f /init.sql"
    restart: "no"

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    env_file: .env
    restart: unless-stopped
    depends_on:
      init-db:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    restart: unless-stopped
    depends_on:
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_KEY=${API_KEY}
      - API_INTERNAL_URL=http://api:8000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

